# Notebook container configuration
image:
  repository: jupyter/datascience-notebook
  tag: latest
  pullPolicy: Always

# Image pull secrets
imagePullSecrets: []
# - name: teknoir-registry

# Service node selector
nodeSelector: {}

# Resource requests and limits
resources:
  requests:
    memory: 512Mi
    cpu: 100m
  limits:
    memory: 1Gi
    cpu: 1500m

# Service configuration
nodePort:
  enabled: false
